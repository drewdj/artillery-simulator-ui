<!-- Artillery Simulator UI — Main Layout -->
<div class="app-layout">

  <!-- ── Left vertical sidebar ────────────────────────────────────────── -->
  <app-sidebar></app-sidebar>

  <!-- ── Main area: drawers + map canvas ──────────────────────────────── -->
  <mat-drawer-container class="content-area" [hasBackdrop]="false">

    <!-- Lateral drawer — entity tree / entity list / layers panel -->
    <mat-drawer
      class="feature-drawer"
      mode="side"
      [opened]="drawerState.isOpen()"
      (closedStart)="drawerState.close()"
    >
      @if (drawerState.activePanel() === 'entity-tree') {
        <app-entity-tree></app-entity-tree>
      } @else if (drawerState.activePanel() === 'entity-list') {
        <app-entity-list></app-entity-list>
      } @else if (drawerState.activePanel() === 'layers') {
        <app-layers-panel></app-layers-panel>
      }
    </mat-drawer>

    <!-- Map canvas area -->
    <mat-drawer-content
      class="map-canvas-area"
      [class.mode-3d]="mapMode.mode() === '3d'"
    >
      <!-- 2D map: always in DOM, hidden via CSS in 3D mode to preserve OL state -->
      <app-map-2d></app-map-2d>

      <!-- 3D mode: transparent overlay, VBS renders beneath via CEF -->
      @if (mapMode.mode() === '3d') {
        <app-map-3d></app-map-3d>
      }
    </mat-drawer-content>

  </mat-drawer-container>
</div>
