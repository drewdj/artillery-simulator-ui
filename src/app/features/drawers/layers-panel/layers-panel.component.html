<div class="drawer-panel" role="region" aria-label="Panel de capas GIS">
  <div class="drawer-header">
    <mat-icon class="header-icon">layers</mat-icon>
    <h2 class="drawer-title">Capas GIS</h2>
  </div>

  <mat-divider></mat-divider>

  <div class="layers-list" role="list">
    @for (layer of layers(); track layer.id) {
      <div class="layer-item" role="listitem">
        <mat-icon class="layer-icon">{{ layer.icon }}</mat-icon>
        <div class="layer-info">
          <span class="layer-name">{{ layer.name }}</span>
          <span class="layer-type">{{ layerTypeLabel(layer.type) }}</span>
        </div>
        <mat-slide-toggle
          [checked]="layer.visible"
          (change)="toggleLayer(layer.id)"
          [attr.aria-label]="'Toggle capa ' + layer.name"
          color="primary"
        ></mat-slide-toggle>
      </div>
    }
  </div>
</div>
