<div class="drawer-panel" role="region" aria-label="Lista de entidades">
  <div class="drawer-header">
    <mat-icon class="header-icon">list_alt</mat-icon>
    <h2 class="drawer-title">Entidades Activas</h2>
    <span class="entity-count">{{ entities().length }}</span>
  </div>

  <mat-divider></mat-divider>

  <div class="entity-list" role="list">
    @for (entity of entities(); track entity.id) {
      <div class="entity-item" role="listitem">
        <div class="entity-icon-wrapper">
          <mat-icon class="entity-type-icon">gps_fixed</mat-icon>
        </div>
        <div class="entity-info">
          <span class="entity-name">{{ entity.name }}</span>
          <span class="entity-unit">{{ entity.unit }}</span>
        </div>
        <div class="entity-status" [class]="'status-' + entity.status">
          <mat-icon class="status-icon">{{ statusIcon(entity.status) }}</mat-icon>
          <span class="status-label">{{ statusLabel(entity.status) }}</span>
        </div>
      </div>
    } @empty {
      <div class="empty-state">
        <mat-icon>inbox</mat-icon>
        <p>No hay entidades</p>
      </div>
    }
  </div>
</div>
